name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  release:
    needs: verify
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - uses: Swatinem/rust-cache@v2

      - name: Publish unigateway-core
        run: |
          cargo publish -p unigateway-core --no-verify || \
          echo "::warning::unigateway-core already published, skipping"

      - name: Publish unigateway-config
        run: |
          cargo publish -p unigateway-config --no-verify || \
          echo "::warning::unigateway-config already published, skipping"

      - name: Publish unigateway-protocol
        run: |
          cargo publish -p unigateway-protocol --no-verify || \
          echo "::warning::unigateway-protocol already published, skipping"

      - name: Publish unigateway-host
        run: |
          cargo publish -p unigateway-host --no-verify || \
          echo "::warning::unigateway-host already published, skipping"

      - name: Publish unigateway-sdk
        run: |
          cargo publish -p unigateway-sdk --no-verify || \
          echo "::warning::unigateway-sdk already published, skipping"

      - name: Publish unigateway (deprecated shim)
        run: |
          cargo publish -p unigateway --no-verify || \
          echo "::warning::unigateway already published, skipping"
