openapi: 3.1.0
info:
  title: UniGateway API
  version: 1.3.0
  description: >
    Unified LLM gateway supporting OpenAI, Anthropic, DeepSeek, Groq, MiniMax,
    and any OpenAI-compatible provider. Provides chat completions, messages,
    embeddings, model listing, admin management, health, and metrics.

servers:
  - url: http://localhost:3210
    description: Local development

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:
  /v1/chat/completions:
    post:
      operationId: chatCompletions
      summary: OpenAI-compatible chat completions
      description: >
        Proxies to the upstream provider bound to the service associated with
        the API key. Supports streaming via `stream: true`. Supports
        `x-unigateway-provider` or `x-target-vendor` header to pin a provider.
      security:
        - BearerAuth: []
      parameters:
        - name: x-unigateway-provider
          in: header
          schema:
            type: string
          description: Pin request to a specific provider by name
        - name: x-target-vendor
          in: header
          schema:
            type: string
          description: Alias for x-unigateway-provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
            text/event-stream:
              schema:
                type: string
                description: SSE stream (when stream=true)

  /v1/messages:
    post:
      operationId: anthropicMessages
      summary: Anthropic-compatible messages API
      security:
        - ApiKeyAuth: []
      parameters:
        - name: anthropic-version
          in: header
          required: true
          schema:
            type: string
            default: "2023-06-01"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicRequest"
      responses:
        "200":
          description: Messages response
          content:
            application/json:
              schema:
                type: object

  /v1/embeddings:
    post:
      operationId: createEmbeddings
      summary: OpenAI-compatible text embeddings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingRequest"
      responses:
        "200":
          description: Embedding response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponse"

  /v1/models:
    get:
      operationId: listModels
      summary: List available models from all enabled providers
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        object:
                          type: string
                        created:
                          type: integer
                        owned_by:
                          type: string

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      security: []
      responses:
        "200":
          description: Gateway is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus-style request metrics
      security: []
      responses:
        "200":
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string

  /api/admin/services:
    get:
      operationId: listServices
      summary: List all services
      security:
        - AdminToken: []
      responses:
        "200":
          description: Service list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminServiceListResponse"
    post:
      operationId: createService
      summary: Create or update a service
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name]
              properties:
                id:
                  type: string
                name:
                  type: string
                routing_strategy:
                  type: string
                  enum: [round_robin, fallback]
                  default: round_robin
      responses:
        "200":
          description: Service created/updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminServiceUpsertResponse"

  /api/admin/modes:
    get:
      operationId: listModes
      summary: List service modes for external admin clients
      description: >
        Returns mode summaries derived from services, bindings, and preferences.default_mode.
        This endpoint is intended for external admin tools such as UniAdmin.
      security:
        - AdminToken: []
      parameters:
        - name: detailed
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Return full mode details (providers and keys) when true
      responses:
        "200":
          description: Mode summaries
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AdminModeListSummaryResponse"
                  - $ref: "#/components/schemas/AdminModeListDetailedResponse"
              examples:
                summary:
                  summary: Summary mode list
                  value:
                    success: true
                    data:
                      - id: fast
                        name: Fast
                        routing_strategy: round_robin
                        is_default: true
                        provider_count: 1
                        provider_names: [deepseek-main]
                      - id: strong
                        name: Strong
                        routing_strategy: fallback
                        is_default: false
                        provider_count: 2
                        provider_names: [openai-main, openai-backup]
                detailed:
                  summary: Detailed mode list
                  value:
                    success: true
                    data:
                      - id: fast
                        name: Fast
                        is_default: true
                        routing_strategy: round_robin
                        providers:
                          - name: deepseek-main
                            provider_type: openai
                            endpoint_id: deepseek:global
                            base_url: https://api.deepseek.com
                            default_model: deepseek-chat
                            model_mapping: null
                            has_api_key: true
                            is_enabled: true
                            priority: 0
                        keys:
                          - key: ugk_fast_123
                            is_active: true
                            quota_limit: null
                            qps_limit: null
                            concurrency_limit: null

  /api/admin/preferences/default-mode:
    post:
      operationId: setDefaultMode
      summary: Set default mode
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode_id]
              properties:
                mode_id:
                  type: string
            examples:
              switchToStrong:
                value:
                  mode_id: strong
      responses:
        "200":
          description: Default mode updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDefaultModeResponse"
              examples:
                ok:
                  value:
                    success: true
                    data:
                      mode_id: strong
        "400":
          description: Unknown mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminErrorResponse"
              examples:
                invalidMode:
                  value:
                    success: false
                    error: mode 'missing' not found

  /api/admin/providers:
    get:
      operationId: listProviders
      summary: List all providers
      security:
        - AdminToken: []
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProviderListResponse"
    post:
      operationId: createProvider
      summary: Create or update a provider
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Provider"
      responses:
        "200":
          description: Provider created/updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProviderUpsertResponse"

  /api/admin/bindings:
    post:
      operationId: bindProvider
      summary: Bind a provider to a service
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service_id, provider_id]
              properties:
                service_id:
                  type: string
                provider_id:
                  type: integer
                  description: 0-based index of the provider
      responses:
        "200":
          description: Binding created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBindingResponse"
        "400":
          description: Invalid service_id or provider_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminErrorResponse"

  /api/admin/api-keys:
    get:
      operationId: listApiKeys
      summary: List all API keys
      security:
        - AdminToken: []
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminApiKeyListResponse"
    post:
      operationId: createApiKey
      summary: Create or update an API key
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKey"
      responses:
        "200":
          description: API key created/updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminApiKeyUpsertResponse"
    patch:
      operationId: rebindApiKeyService
      summary: Rebind an existing API key to a service
      description: >
        Updates only the API key's service_id. Existing quota and rate-limit fields are preserved.
      security:
        - AdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, service_id]
              properties:
                key:
                  type: string
                service_id:
                  type: string
            examples:
              rebindToStrong:
                value:
                  key: ugk_fast_123
                  service_id: strong
      responses:
        "200":
          description: API key rebind succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminApiKeyUpsertResponse"
              examples:
                ok:
                  value:
                    success: true
                    data:
                      key: ugk_fast_123
                      service_id: strong
        "400":
          description: Unknown key or service_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminErrorResponse"
              examples:
                unknownKey:
                  value:
                    success: false
                    error: api key 'ugk_missing' not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Gateway API key (ugk_...)
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Gateway API key for Anthropic-style endpoints
    AdminToken:
      type: apiKey
      in: header
      name: x-admin-token
      description: Admin token (set via UNIGATEWAY_ADMIN_TOKEN env)

  schemas:
    ChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          example: gpt-4o
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        stream:
          type: boolean
          default: false
        temperature:
          type: number
        max_tokens:
          type: integer

    ChatResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    AnthropicRequest:
      type: object
      required: [model, max_tokens, messages]
      properties:
        model:
          type: string
          example: claude-sonnet-4-20250514
        max_tokens:
          type: integer
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
        stream:
          type: boolean
          default: false

    EmbeddingRequest:
      type: object
      required: [model, input]
      properties:
        model:
          type: string
          example: text-embedding-3-small
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    EmbeddingResponse:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
              index:
                type: integer
              embedding:
                type: array
                items:
                  type: number
        model:
          type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            total_tokens:
              type: integer

    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        routing_strategy:
          type: string
          enum: [round_robin, fallback]

    Provider:
      type: object
      required: [name, provider_type, api_key]
      properties:
        name:
          type: string
        provider_type:
          type: string
          enum: [openai, anthropic]
        endpoint_id:
          type: string
        base_url:
          type: string
        api_key:
          type: string
        model_mapping:
          type: string
          description: 'JSON object mapping downstream model names to upstream, e.g. {"chat":"gpt-4o"}'

    ApiKey:
      type: object
      required: [key, service_id]
      properties:
        key:
          type: string
        service_id:
          type: string
        quota_limit:
          type: integer
          nullable: true
        qps_limit:
          type: number
          nullable: true
        concurrency_limit:
          type: integer
          nullable: true

    AdminErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string

    AdminServiceListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string

    AdminServiceUpsertResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            id:
              type: string
            name:
              type: string

    AdminModeSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        routing_strategy:
          type: string
          enum: [round_robin, fallback]
        is_default:
          type: boolean
        provider_count:
          type: integer
        provider_names:
          type: array
          items:
            type: string

    AdminModeProvider:
      type: object
      properties:
        name:
          type: string
        provider_type:
          type: string
        endpoint_id:
          type: string
          nullable: true
        base_url:
          type: string
          nullable: true
        default_model:
          type: string
          nullable: true
        model_mapping:
          type: string
          nullable: true
        has_api_key:
          type: boolean
        is_enabled:
          type: boolean
        priority:
          type: integer

    AdminModeKey:
      type: object
      properties:
        key:
          type: string
        is_active:
          type: boolean
        quota_limit:
          type: integer
          nullable: true
        qps_limit:
          type: number
          nullable: true
        concurrency_limit:
          type: integer
          nullable: true

    AdminModeDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        is_default:
          type: boolean
        routing_strategy:
          type: string
          enum: [round_robin, fallback]
        providers:
          type: array
          items:
            $ref: "#/components/schemas/AdminModeProvider"
        keys:
          type: array
          items:
            $ref: "#/components/schemas/AdminModeKey"

    AdminModeListSummaryResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminModeSummary"

    AdminModeListDetailedResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminModeDetail"

    AdminDefaultModeResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            mode_id:
              type: string

    AdminProviderListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              provider_type:
                type: string
              endpoint_id:
                type: string
                nullable: true
              base_url:
                type: string
                nullable: true

    AdminProviderUpsertResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            provider_id:
              type: integer

    AdminBindingResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            service_id:
              type: string
            provider_id:
              type: integer

    AdminApiKeyListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              service_id:
                type: string
              quota_limit:
                type: integer
                nullable: true
              used_quota:
                type: integer
              is_active:
                type: integer
              qps_limit:
                type: number
                nullable: true
              concurrency_limit:
                type: integer
                nullable: true

    AdminApiKeyUpsertResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            key:
              type: string
            service_id:
              type: string
